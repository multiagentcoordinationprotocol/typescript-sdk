syntax = "proto3";

package macp.modes.handoff.v1;

message HandoffOfferPayload {
  string handoff_id = 1;
  string target_participant = 2;
  string scope = 3;
  string reason = 4;
}

message HandoffContextPayload {
  string handoff_id = 1;
  string content_type = 2;
  bytes context = 3;
}

message HandoffAcceptPayload {
  string handoff_id = 1;
  string accepted_by = 2;
  string reason = 3;
}

message HandoffDeclinePayload {
  string handoff_id = 1;
  string declined_by = 2;
  string reason = 3;
}

// Handoff Mode terminates with macp.v1.CommitmentPayload.
